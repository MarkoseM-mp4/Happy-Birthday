<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Happy Birthday!</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <!-- Snake game overlay — positioned over GB screen -->
  <canvas id="gameScreen"></canvas>

  <!-- Camera Overlay -->
  <div id="cameraOverlay" class="camera-overlay">
    <div class="camera-content">
      <h1 id="cameraMessage" class="elegant-title">Turn on your camera</h1>
      <div class="video-container">
        <video id="cameraFeed" autoplay playsinline muted></video>
      </div>
      <button id="surpriseBtn" class="elegant-btn" style="display: none;">Open Surprise</button>
    </div>
  </div>

  <!-- Save Video Modal -->
  <div id="sendVideoModal" class="save-video-modal">
    <div class="modal-content">
      <h2 class="elegant-title">Wait before you go</h2>
      <p>Save your recording so you don't lose it.</p>
      <div class="modal-actions">
        <button id="sendVideoBtn" class="elegant-btn primary">Save Recording</button>
        <button id="continueBtn" class="elegant-btn secondary">Keep Exploring</button>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js?v=54"></script>
</body>
</html>
